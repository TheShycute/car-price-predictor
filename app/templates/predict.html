<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>价格预测 - 二手车价格分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #f5f6fa 0%, #dfe6e9 100%); min-height: 100vh; color: #2d3436; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; }
        .header nav a { color: rgba(255,255,255,0.9); text-decoration: none; margin-left: 24px; font-size: 15px; padding: 8px 16px; border-radius: 6px; transition: .2s; }
        .header nav a:hover, .header nav a.active { background: rgba(255,255,255,0.2); }
        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 24px; }
        .card h2 { font-size: 20px; margin-bottom: 24px; color: #2d3436; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #636e72; margin-bottom: 6px; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 12px 16px; border: 2px solid #dfe6e9; border-radius: 10px; font-size: 15px; transition: .2s; outline: none; }
        .form-group input:focus, .form-group select:focus { border-color: #667eea; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: .2s; }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .result { text-align: center; padding: 24px; }
        .result .price { font-size: 48px; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .result .unit { font-size: 18px; color: #636e72; }
        .result .note { font-size: 13px; color: #b2bec3; margin-top: 8px; }
        .loading { text-align: center; padding: 40px; color: #636e72; }
        .error { background: #ffeaa7; color: #d63031; padding: 12px; border-radius: 8px; margin-bottom: 16px; }
        .info-box { background: #f0f3ff; border: 1px solid #d0d7ff; border-radius: 12px; padding: 16px; margin-top: 20px; }
        .info-box h4 { font-size: 14px; color: #667eea; margin-bottom: 8px; }
        .info-box p { font-size: 13px; color: #636e72; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚗 二手车价格分析平台</h1>
        <nav>
            <a href="/">数据仪表盘</a>
            <a href="/predict" class="active">价格预测</a>
        </nav>
    </div>

    <div class="container">
        <div class="card">
            <h2>🔮 二手车价格预测</h2>
            <div id="errorBox" class="error" style="display:none"></div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>🚙 品牌</label>
                    <select id="brand">
                        <option value="大众">大众</option><option value="丰田">丰田</option><option value="本田">本田</option>
                        <option value="日产">日产</option><option value="别克">别克</option><option value="福特">福特</option>
                        <option value="现代">现代</option><option value="雪佛兰">雪佛兰</option><option value="比亚迪">比亚迪</option>
                        <option value="宝马">宝马</option><option value="奥迪">奥迪</option><option value="奔驰">奔驰</option>
                        <option value="吉利汽车">吉利</option><option value="哈弗">哈弗</option><option value="长安">长安</option>
                        <option value="起亚">起亚</option><option value="马自达">马自达</option><option value="斯柯达">斯柯达</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🏙️ 所在城市</label>
                    <select id="city">
                        <option value="北京">北京</option><option value="上海">上海</option><option value="广州">广州</option>
                        <option value="深圳">深圳</option><option value="成都">成都</option><option value="杭州">杭州</option>
                        <option value="武汉">武汉</option><option value="南京">南京</option><option value="重庆">重庆</option>
                        <option value="西安">西安</option><option value="长沙">长沙</option><option value="郑州">郑州</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>📅 上牌年份</label>
                    <input type="number" id="year" value="2020" min="2000" max="2026" placeholder="如: 2020">
                </div>
                <div class="form-group">
                    <label>🛣️ 行驶里程 (万公里)</label>
                    <input type="number" id="mileage" value="5.0" min="0.1" max="80" step="0.1" placeholder="如: 5.0">
                </div>
            </div>
            
            <button class="btn" onclick="predict()">💰 预测价格</button>
            
            <div id="result" style="display:none" class="result"></div>
            
            <div class="info-box">
                <h4>💡 预测说明</h4>
                <p>此预测基于瓜子二手车全国数据训练的机器学习模型 (XGBoost)。
                预测结果仅供参考，实际价格受车况、配置、地区供需等多因素影响。</p>
            </div>
        </div>
    </div>

    <script>
    async function predict() {
        const errorBox = document.getElementById("errorBox");
        const resultDiv = document.getElementById("result");
        errorBox.style.display = "none";
        resultDiv.style.display = "none";
        
        const year = document.getElementById("year").value;
        const mileage = document.getElementById("mileage").value;
        const brand = document.getElementById("brand").value;
        const city = document.getElementById("city").value;
        
        if (!year || !mileage) {
            errorBox.textContent = "请填写所有字段";
            errorBox.style.display = "block";
            return;
        }
        
        resultDiv.innerHTML = '<div class="loading">⏳ 预测中...</div>';
        resultDiv.style.display = "block";
        
        try {
            const resp = await fetch("/api/predict", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ year: parseInt(year), mileage: parseFloat(mileage), brand, city })
            });
            const data = await resp.json();
            
            if (data.status === "error") {
                errorBox.textContent = data.error;
                errorBox.style.display = "block";
                resultDiv.style.display = "none";
                return;
            }
            
            const price = data.predicted_price;
            let priceRange = "";
            if (price < 3) priceRange = "经济实惠型";
            else if (price < 6) priceRange = "性价比之选";
            else if (price < 10) priceRange = "品质优选";
            else priceRange = "高端车型";
            
            resultDiv.innerHTML = `
                <div class="price">${price} <span class="unit">万元</span></div>
                <div style="color:#636e72;margin-top:8px;">${priceRange} · ${data.status === "heuristic" ? "启发式预估" : "ML模型预测"}</div>
                <div class="note">${brand} · ${year}年 · ${mileage}万公里 · ${city}</div>
            `;
        } catch (e) {
            errorBox.textContent = "预测请求失败: " + e.message;
            errorBox.style.display = "block";
        }
    }
    </script>
</body>
</html>
