<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Predictor · UsedCarInsight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080c14;--bg2:#0f1520;--bg-card:rgba(15,21,32,0.85);
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --text:#e8eaf0;--text2:#8894a8;--text3:#586278;
  --gold:#d4a853;--gold2:#f0d080;--gold-light:rgba(212,168,83,0.12);
  --blue:#4d90fe;--blue-light:rgba(77,144,254,0.1);
  --radius:20px;
  --font-display:'Playfair Display',serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;
}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-glow::before{
  content:'';position:absolute;top:-30%;left:-15%;width:70%;height:120%;
  background:radial-gradient(ellipse at center,rgba(212,168,83,0.04) 0%,transparent 70%);
}
.bg-glow::after{
  content:'';position:absolute;bottom:-20%;right:-10%;width:60%;height:100%;
  background:radial-gradient(ellipse at center,rgba(77,144,254,0.04) 0%,transparent 70%);
}

#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

.nav{
  position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:18px 48px;background:rgba(8,12,20,0.85);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-brand{display:flex;align-items:center;gap:14px}
.nav-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#c49530);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(212,168,83,0.25)}
.nav-title{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.5px}
.nav-title span{color:var(--gold)}
.nav-links{display:flex;gap:4px;background:var(--bg2);padding:5px;border-radius:14px}
.nav-links a{text-decoration:none;padding:10px 22px;border-radius:11px;font-size:13px;font-weight:500;color:var(--text2);transition:.3s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{background:var(--bg-card);color:var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.3)}

.container{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:40px 20px}

.card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:44px;margin-bottom:20px;backdrop-filter:blur(16px);position:relative;overflow:hidden;
}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.card h2{font-family:var(--font-display);font-size:22px;font-weight:600;margin-bottom:36px;display:flex;align-items:center;gap:12px}
.card h2::after{content:'';flex:1;height:1px;background:var(--border)}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.fg{margin-bottom:20px}
.fg label{display:block;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px}
.fg select,.fg input{
  width:100%;padding:14px 16px;background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;font-size:15px;font-family:var(--font-body);color:var(--text);
  transition:.25s;outline:none;appearance:none;
}
.fg select{
  background-image:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M1 1l5 5 5-5' stroke='%23586278' stroke-width='1.5' fill='none'/></svg>");
  background-repeat:no-repeat;background-position:right 16px center;
}
.fg select:focus,.fg input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-light)}
.fg input[type=number]{-moz-appearance:textfield}

.btn{
  width:100%;padding:16px;border:none;border-radius:14px;
  background:linear-gradient(135deg,var(--gold),#c49530);
  color:#080c14;font-size:15px;font-weight:600;cursor:pointer;
  transition:.3s;font-family:var(--font-display);letter-spacing:.5px;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(212,168,83,.3)}

.result{
  margin-top:28px;padding:40px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);text-align:center;display:none;
}
.result.show{display:block;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.result-price{font-family:var(--font-display);font-size:72px;font-weight:700;line-height:1}
.result-price small{font-size:20px;color:var(--text2);font-weight:400}
.result-tag{display:inline-block;margin-top:14px;padding:6px 18px;border-radius:20px;font-size:11px;font-weight:600}
.tag-budget{background:var(--gold-light);color:var(--gold)}
.tag-value{background:rgba(52,199,89,.12);color:#34c759}
.tag-premium{background:var(--blue-light);color:var(--blue)}
.result-meta{color:var(--text2);margin-top:12px;font-size:13px}

.info{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px 28px;backdrop-filter:blur(16px);
}
.info h4{font-family:var(--font-display);color:var(--gold);font-size:14px;margin-bottom:10px}
.info p{color:var(--text2);font-size:13px;line-height:1.8}

.error{display:none;padding:12px 16px;background:rgba(224,96,144,.08);border:1px solid rgba(224,96,144,.2);border-radius:10px;color:#e06090;font-size:12px;margin-bottom:16px}

.loading{display:flex;justify-content:center;gap:10px;padding:24px}
.loading span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:bounce .6s infinite alternate}
.loading span:nth-child(2){animation-delay:.2s}
.loading span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{transform:translateY(-14px);opacity:.2}}

@media(max-width:640px){.form-row{grid-template-columns:1fr}.container{padding:20px 12px}.card{padding:24px}.result-price{font-size:44px}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<canvas id="bg-canvas"></canvas>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">🔮</div>
    <div class="nav-title">Price<span>Predictor</span></div>
  </div>
  <div class="nav-links">
    <a href="/">仪表盘</a>
    <a href="/predict" class="active">价格预测</a>
  </div>
</nav>

<div class="container">
  <div class="card">
    <h2>智能估值</h2>
    <div class="error" id="err"></div>

    <div class="form-row">
      <div class="fg"><label>品牌 Brand</label>
        <select id="brand">
          <option>大众</option><option>丰田</option><option>本田</option>
          <option>日产</option><option>别克</option><option>福特</option>
          <option>现代</option><option>雪佛兰</option><option>比亚迪</option>
          <option>宝马</option><option>奥迪</option><option>奔驰</option>
          <option>吉利汽车</option><option>哈弗</option><option>长安</option>
          <option>起亚</option><option>马自达</option><option>斯柯达</option>
          <option>领克</option><option>荣威</option><option>名爵</option>
          <option>广汽传祺</option><option>奇瑞</option><option>标致</option>
          <option>雪铁龙</option><option>沃尔沃</option><option>凯迪拉克</option>
          <option>雷克萨斯</option><option>Jeep</option><option>宝骏</option>
        </select>
      </div>
      <div class="fg"><label>城市 City</label>
        <select id="city">
          <option>北京</option><option>上海</option><option>广州</option><option>深圳</option>
          <option>成都</option><option>杭州</option><option>武汉</option><option>南京</option>
          <option>重庆</option><option>西安</option><option>长沙</option><option>郑州</option>
          <option>天津</option><option>苏州</option><option>东莞</option><option>青岛</option>
          <option>沈阳</option><option>宁波</option><option>福州</option><option>合肥</option>
        </select>
      </div>
    </div>

    <div class="form-row">
      <div class="fg"><label>上牌年份 Year</label>
        <input type="number" id="year" value="2020" min="2000" max="2026">
      </div>
      <div class="fg"><label>行驶里程 Mileage (万km)</label>
        <input type="number" id="mileage" value="5.0" min="0.1" max="80" step="0.1">
      </div>
    </div>

    <button class="btn" onclick="go()">开始估值</button>
    <div class="result" id="result"></div>
  </div>

  <div class="info">
    <h4>Model · 模型说明</h4>
    <p>基于 XGBoost 梯度提升模型训练，数据来源于瓜子二手车全国真实交易记录。<br>特征维度：年份、里程、车龄、品牌、城市。R² = 0.79，MAE ≈ 0.71 万元。<br>预测结果仅供参考，实际价格受车况、配置、供需等多因素影响。</p>
  </div>
</div>

<!-- Background particles -->
<script>
(function(){
  const canvas=document.getElementById('bg-canvas');
  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
  camera.position.z=10;

  const g=new THREE.BufferGeometry();
  const c=400;
  const p=new Float32Array(c*3);
  for(let i=0;i<c;i++){p[i*3]=(Math.random()-.5)*16;p[i*3+1]=(Math.random()-.5)*10;p[i*3+2]=(Math.random()-.5)*8}
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  const m=new THREE.PointsMaterial({color:0xd4a853,size:.04,transparent:true,opacity:.5,blending:THREE.AdditiveBlending});
  const pts=new THREE.Points(g,m);
  scene.add(pts);

  function animate(){
    requestAnimationFrame(animate);
    pts.rotation.y+=.0008;
    pts.rotation.x+=.0003;
    renderer.render(scene,camera);
  }
  animate();
  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
})();

// GSAP entrance
window.addEventListener('load',()=>{
  gsap.from('.card',{y:40,opacity:0,duration:.8,ease:'power3.out'});
  gsap.from('.info',{y:30,opacity:0,duration:.6,delay:.3,ease:'power3.out'});
});
</script>

<script>
async function go(){
  document.getElementById('err').style.display='none';
  const rb=document.getElementById('result');rb.classList.remove('show');
  const brand=document.getElementById('brand').value,city=document.getElementById('city').value;
  const year=document.getElementById('year').value,mileage=document.getElementById('mileage').value;

  if(!year||!mileage){document.getElementById('err').textContent='请填写所有字段';document.getElementById('err').style.display='block';return}

  rb.innerHTML='<div class="loading"><span></span><span></span><span></span></div>';
  rb.classList.add('show');

  try{
    const r=await fetch('/api/predict',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:parseInt(year),mileage:parseFloat(mileage),brand,city})});
    const d=await r.json();
    if(d.status==='error'){document.getElementById('err').textContent=d.error;document.getElementById('err').style.display='block';rb.classList.remove('show');return}
    const p=d.predicted_price;
    let tag='',tagClass='';
    if(p<3){tag='经济实惠';tagClass='tag-budget'}
    else if(p<6){tag='性价比之选';tagClass='tag-value'}
    else if(p<10){tag='品质优选';tagClass='tag-premium'}
    else{tag='优选高端';tagClass='tag-premium'}
    rb.innerHTML=`<div class="result-price">${p}<small> 万元</small></div><div class="result-tag ${tagClass}">${tag}</div><div class="result-meta">${brand} · ${year}年上牌 · ${mileage}万km · ${city} · ${d.status==='heuristic'?'启发式估算':'ML模型预测'}</div>`;
  }catch(e){document.getElementById('err').textContent='请求失败: '+e.message;document.getElementById('err').style.display='block';rb.classList.remove('show')}
}
</script>
</body>
</html>
