<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UsedCarInsight · 全国二手车价格洞察</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --bg2:#0f1520; --bg-card:rgba(15,21,32,0.85);
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --text:#e8eaf0; --text2:#8894a8; --text3:#586278;
  --gold:#d4a853; --gold-light:rgba(212,168,83,0.12);
  --blue:#4d90fe; --blue-light:rgba(77,144,254,0.1);
  --green:#34c759; --green-light:rgba(52,199,89,0.1);
  --rose:#e06090; --rose-light:rgba(224,96,144,0.1);
  --radius:20px;
  --font-display:'Playfair Display',serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-glow::before{content:'';position:absolute;top:-30%;left:-15%;width:70%;height:130%;background:radial-gradient(ellipse at center,rgba(212,168,83,0.04) 0%,transparent 70%)}
.bg-glow::after{content:'';position:absolute;bottom:-20%;right:-10%;width:60%;height:110%;background:radial-gradient(ellipse at center,rgba(77,144,254,0.04) 0%,transparent 70%)}

.app{position:relative;z-index:1}

.nav{
  position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:16px 48px;background:rgba(8,12,20,0.9);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-brand{display:flex;align-items:center;gap:14px}
.nav-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#c49530);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(212,168,83,0.25)}
.nav-title{font-family:var(--font-display);font-size:20px;font-weight:700;}
.nav-title span{color:var(--gold)}
.nav-links{display:flex;gap:4px;background:var(--bg2);padding:5px;border-radius:14px}
.nav-links a{text-decoration:none;padding:10px 22px;border-radius:11px;font-size:13px;font-weight:500;color:var(--text2);transition:.3s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{background:var(--bg-card);color:var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* Layout: map left, stats right */
.layout{display:grid;grid-template-columns:minmax(0,1fr) 420px;gap:20px;padding:24px 48px 40px;min-height:calc(100vh - 160px)}

.map-section{display:flex;flex-direction:column;gap:20px}
.map-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;backdrop-filter:blur(12px);flex:1;position:relative;overflow:hidden;
}
.map-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.map-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.map-head h3{font-family:var(--font-display);font-size:15px;font-weight:600}
.map-badge{font-size:10px;font-weight:600;padding:5px 10px;border-radius:20px;background:var(--gold-light);color:var(--gold);text-transform:uppercase;letter-spacing:.5px}
#chinaMap{width:100%;height:calc(100% - 40px);min-height:500px}

.sidebar{display:flex;flex-direction:column;gap:16px}
.side-stat{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;backdrop-filter:blur(12px);position:relative;overflow:hidden;
}
.side-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.side-stat-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px}
.side-stat-value{font-family:var(--font-display);font-size:34px;font-weight:700}
.side-stat-value.accent{color:var(--gold)}
.side-stat-sub{font-size:12px;color:var(--text2);margin-top:4px}

.side-panel{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;backdrop-filter:blur(12px);flex:1;overflow-y:auto;position:relative;overflow:hidden;
}
.side-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.side-panel h4{font-family:var(--font-display);font-size:14px;font-weight:600;margin-bottom:16px;color:var(--gold)}
.side-empty{color:var(--text3);font-size:13px;text-align:center;padding:40px 0}

.detail-row{margin-bottom:18px}
.detail-row h5{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.detail-item{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid var(--border)}
.detail-item .name{color:var(--text2)}
.detail-item .val{font-weight:600}
.detail-item .val.gold{color:var(--gold)}

.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 48px 40px}
.chart-card{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;backdrop-filter:blur(12px);position:relative;overflow:hidden;
}
.chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.chart-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.chart-head h3{font-family:var(--font-display);font-size:14px;font-weight:600}
.chart-badge{font-size:9px;font-weight:600;padding:4px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-green{background:var(--green-light);color:var(--green)}
.chart-body{height:340px}

.footer{text-align:center;padding:24px;color:var(--text3);font-size:11px;border-top:1px solid var(--border)}

@media(max-width:1200px){.layout{grid-template-columns:1fr;padding:16px}.charts-row{grid-template-columns:1fr;padding:0 16px 40px}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<div class="app">

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">🚗</div>
    <div class="nav-title">UsedCar<span>Insight</span></div>
  </div>
  <div class="nav-links">
    <a href="/" class="active">仪表盘</a>
    <a href="/predict">价格预测</a>
  </div>
</nav>

<div class="layout">
  <!-- Map -->
  <div class="map-section">
    <div class="map-card">
      <div class="map-head">
        <h3>中国二手车价格分布</h3>
        <span class="map-badge">点击省份查看详情</span>
      </div>
      <div id="chinaMap"></div>
    </div>
  </div>
  
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="side-stat" id="sideStat"></div>
    <div class="side-panel" id="detailPanel">
      <div class="side-empty">👆 点击地图上的省份<br>查看详细数据</div>
    </div>
  </div>
</div>

<div class="charts-row">
  <div class="chart-card">
    <div class="chart-head"><h3>价格区间分布</h3><span class="chart-badge badge-blue">Distribution</span></div>
    <div class="chart-body" id="cPriceDist"></div>
  </div>
  <div class="chart-card">
    <div class="chart-head"><h3>年份价格趋势</h3><span class="chart-badge badge-green">Trend</span></div>
    <div class="chart-body" id="cYearTrend"></div>
  </div>
</div>

<footer class="footer">UsedCarInsight · Data from guazi.com · For Educational Purposes · 2026</footer>
</div>

<script>
const Th={text:'#8894a8',gold:'#d4a853',blue:'#4d90fe',green:'#34c759',rose:'#e06090',border:'rgba(255,255,255,0.06)'};
async function get(u){return (await fetch(u)).json()}

// Province name mapping for ECharts
// GeoJSON name -> API province name mapping
const GEO_TO_API = {
  '北京市':'北京','上海市':'上海','天津市':'天津','重庆市':'重庆',
  '广东省':'广东','四川省':'四川','浙江省':'浙江','江苏省':'江苏',
  '湖北省':'湖北','湖南省':'湖南','陕西省':'陕西','河南省':'河南',
  '山东省':'山东','辽宁省':'辽宁','吉林省':'吉林','黑龙江省':'黑龙江',
  '安徽省':'安徽','福建省':'福建','江西省':'江西','云南省':'云南',
  '贵州省':'贵州','广西壮族自治区':'广西','山西省':'山西','河北省':'河北',
  '甘肃省':'甘肃','海南省':'海南','青海省':'青海',
  '内蒙古自治区':'内蒙古','宁夏回族自治区':'宁夏',
  '新疆维吾尔自治区':'新疆','西藏自治区':'西藏',
  '台湾省':'台湾','香港特别行政区':'香港','澳门特别行政区':'澳门'
};
// Reverse: API name -> GeoJSON name
const API_TO_GEO = Object.fromEntries(Object.entries(GEO_TO_API).map(([k,v])=>[v,k]));
const PROVINCE_NAMES = {
  '北京':'北京','上海':'上海','天津':'天津','重庆':'重庆',
  '广东':'广东','四川':'四川','浙江':'浙江','江苏':'江苏',
  '湖北':'湖北','湖南':'湖南','陕西':'陕西','河南':'河南',
  '山东':'山东','辽宁':'辽宁','吉林':'吉林','黑龙江':'黑龙江',
  '安徽':'安徽','福建':'福建','江西':'江西','云南':'云南',
  '贵州':'贵州','广西':'广西','山西':'山西','河北':'河北',
  '甘肃':'甘肃'
};

async function init(){
  // Load stats
  const stats = await get('/api/stats');
  document.getElementById('sideStat').innerHTML = `
    <div class="side-stat-label">全国总车源</div>
    <div class="side-stat-value accent">${stats.total_cars?.toLocaleString()}</div>
    <div class="side-stat-sub">辆 · 覆盖 ${stats.cities} 个城市</div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
      <div class="side-stat-label">全国均价</div>
      <div class="side-stat-value">¥${stats.avg_price}</div>
      <div class="side-stat-sub">万元 · 最低 ¥${stats.min_price} 最高 ¥${stats.max_price}</div>
    </div>
  `;

  // Province data for map
  const provData = await get('/api/province_data');
  const mapData = [];
  const maxPrice = Math.max(...provData.map(d=>d.avg_price));
  const minPrice = Math.min(...provData.map(d=>d.avg_price));
  
  provData.forEach(d=>{
    const cnName = PROVINCE_NAMES[d.province];
    const geoName = API_TO_GEO[d.province] || d.province;
if(geoName) mapData.push({
      name: geoName,
      value: d.avg_price,
      total: d.total,
      minPrice: d.min_price,
      maxPrice: d.max_price,
      province: d.province
    });
  });

  // China Map
  const mapChart = echarts.init(document.getElementById('chinaMap'));
  
  // Register China map - use built-in
  fetch('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json')
    .then(r=>r.json())
    .then(geoJson=>{
      echarts.registerMap('china', geoJson);
      renderMap(mapChart, mapData, maxPrice, minPrice);
    })
    .catch(()=>{
      // Fallback: try built-in (might not work in all ECharts versions)
      try{
        renderMap(mapChart, mapData, maxPrice, minPrice);
      }catch(e){
        document.getElementById('chinaMap').innerHTML = '<div style="text-align:center;padding:100px;color:#586278">地图加载中...</div>';
      }
    });

  // Price distribution chart
  const priceDist = await get('/api/price_distribution');
  const pc = echarts.init(document.getElementById('cPriceDist'));
  pc.setOption({
    textStyle:{color:Th.text},
    grid:{top:10,right:20,bottom:30,left:50},
    tooltip:{trigger:'axis',backgroundColor:'#0f1520',borderColor:'rgba(255,255,255,0.1)',textStyle:{color:Th.text,fontSize:12}},
    xAxis:{type:'category',data:priceDist.map(d=>d.range),axisLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
    yAxis:{type:'value',splitLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
    series:[{data:priceDist.map(d=>d.count),type:'bar',
      itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:Th.blue},{offset:1,color:'rgba(77,144,254,0.2)'}]),borderRadius:[6,6,0,0]},barMaxWidth:40}]
  });

  // Year trend
  const yearData = await get('/api/price_by_year');
  const yc = echarts.init(document.getElementById('cYearTrend'));
  yc.setOption({
    textStyle:{color:Th.text},
    grid:{top:10,right:20,bottom:30,left:50},
    tooltip:{trigger:'axis',backgroundColor:'#0f1520',borderColor:'rgba(255,255,255,0.1)',textStyle:{color:Th.text,fontSize:12}},
    xAxis:{type:'category',data:yearData.map(d=>d.year),axisLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
    yAxis:{type:'value',splitLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
    series:[{data:yearData.map(d=>+d.mean.toFixed(2)),type:'line',smooth:true,
      lineStyle:{color:Th.green,width:2.5},itemStyle:{color:Th.green},symbol:'circle',symbolSize:6,
      areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(52,199,89,0.15)'},{offset:1,color:'rgba(52,199,89,0)'}])}}]
  });

  // Map click handler
  mapChart.on('click', async function(params){
    if(!params.name) return;
    const apiProv = GEO_TO_API[params.name] || params.data?.province || params.name;
    const detail = await get('/api/province_detail/'+apiProv);
    if(detail.error){
      document.getElementById('detailPanel').innerHTML = `<div class="side-empty">暂无 ${province} 的数据</div>`;
      return;
    }
    showProvinceDetail(detail);
  });

  // GSAP
  gsap.from('.side-stat',{y:30,opacity:0,duration:.7,ease:'power3.out'});
  gsap.from('.side-panel',{y:30,opacity:0,duration:.7,delay:.1,ease:'power3.out'});
  gsap.from('.map-card',{y:40,opacity:0,duration:.8,delay:.15,ease:'power3.out'});
  gsap.from('.chart-card',{y:40,opacity:0,duration:.7,stagger:.1,delay:.25,ease:'power3.out'});
}

function renderMap(chart, data, max, min){
  chart.setOption({
    tooltip:{
      trigger:'item',
      backgroundColor:'#0f1520',
      borderColor:'rgba(255,255,255,0.1)',
      textStyle:{color:'#e8eaf0',fontSize:12},
      formatter:function(p){
        if(!p.data) return p.name;
        return `<b>${p.name}</b><br/>均价: ¥${p.data.value}万<br/>车源: ${p.data.total}辆<br/>区间: ¥${p.data.minPrice}-${p.data.maxPrice}万`;
      }
    },
    visualMap:{
      min:min, max:max,
      left:'left', bottom:20,
      text:['高','低'], textStyle:{color:Th.text,fontSize:10},
      inRange:{color:['#0d1b2a','#1b2d4a','#2a4a6b','#4a7a9b','#d4a853']},
      calculable:true
    },
    series:[{
      type:'map', map:'china',
      roam:true,
      zoom:1.2,
      center:[105,36],
      itemStyle:{
        areaColor:'#0f1a2e',
        borderColor:'rgba(77,144,254,0.3)',
        borderWidth:1,
        shadowColor:'rgba(0,0,0,0.3)',
        shadowBlur:4
      },
      emphasis:{
        label:{show:true,color:'#fff',fontSize:13,fontWeight:'bold'},
        itemStyle:{areaColor:'#d4a853',shadowColor:'rgba(212,168,83,0.4)',shadowBlur:20}
      },
      label:{show:false},
      data:data
    }]
  });
}

function showProvinceDetail(d){
  const html = `
    <h4>${d.province} · 数据分析</h4>
    <div class="detail-row">
      <h5>概览</h5>
      <div class="detail-item"><span class="name">车源总数</span><span class="val">${d.total} 辆</span></div>
      <div class="detail-item"><span class="name">均价</span><span class="val gold">¥${d.avg_price} 万</span></div>
    </div>
    <div class="detail-row">
      <h5>城市分布</h5>
      ${d.cities.slice(0,8).map(c=>`
        <div class="detail-item"><span class="name">${c.city}</span><span class="val">${c.total}辆 · ¥${c.avg_price}万</span></div>
      `).join('')}
    </div>
    <div class="detail-row">
      <h5>热门品牌</h5>
      ${d.top_brands.map(b=>`
        <div class="detail-item"><span class="name">${b.brand}</span><span class="val">${b.total}辆 · ¥${b.avg_price}万</span></div>
      `).join('')}
    </div>
    <div class="detail-row">
      <h5>价格分布</h5>
      ${d.price_dist.map(p=>`
        <div class="detail-item"><span class="name">${p.range}</span><span class="val">${p.count}辆</span></div>
      `).join('')}
    </div>
  `;
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = html;
  gsap.from(panel.children,{y:15,opacity:0,duration:.4,stagger:.03});
}

window.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize',()=>{
  ['chinaMap','cPriceDist','cYearTrend'].forEach(id=>{
    const d=document.getElementById(id);if(d){const i=echarts.getInstanceByDom(d);if(i)i.resize()}
  });
});
</script>
</body>
</html>
