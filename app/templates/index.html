<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UsedCarInsight · 二手车价格洞察</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080c14; --bg2:#0f1520; --bg-card:rgba(15,21,32,0.8);
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.1);
  --text:#e8eaf0; --text2:#8894a8; --text3:#586278;
  --gold:#d4a853; --gold-light:rgba(212,168,83,0.15);
  --blue:#4d90fe; --blue-light:rgba(77,144,254,0.12);
  --green:#34c759; --green-light:rgba(52,199,89,0.12);
  --rose:#e06090; --rose-light:rgba(224,96,144,0.12);
  --radius:20px;
  --font-display:'Playfair Display',serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-body);background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;
}
.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg-glow::before{content:'';position:absolute;top:-40%;left:-20%;width:80%;height:140%;background:radial-gradient(ellipse at center,rgba(212,168,83,0.06) 0%,transparent 70%)}
.bg-glow::after{content:'';position:absolute;bottom:-30%;right:-10%;width:70%;height:120%;background:radial-gradient(ellipse at center,rgba(77,144,254,0.05) 0%,transparent 70%)}
#globe-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
.app{position:relative;z-index:1}

.nav{
  position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:18px 48px;background:rgba(8,12,20,0.85);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.nav-brand{display:flex;align-items:center;gap:14px}
.nav-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--gold),#c49530);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 20px rgba(212,168,83,0.25)}
.nav-title{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:-.5px}
.nav-title span{color:var(--gold)}
.nav-links{display:flex;gap:4px;background:var(--bg2);padding:5px;border-radius:14px}
.nav-links a{text-decoration:none;padding:10px 22px;border-radius:11px;font-size:13px;font-weight:500;color:var(--text2);transition:.3s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{background:var(--bg-card);color:var(--gold);box-shadow:0 2px 8px rgba(0,0,0,.3)}

.hero{padding:52px 48px 40px}
.hero h1{font-family:var(--font-display);font-size:52px;font-weight:700;line-height:1.1;letter-spacing:-1px}
.hero h1 em{font-style:italic;color:var(--gold)}
.hero-sub{font-size:15px;color:var(--text2);margin-top:10px;letter-spacing:.3px}
.hero-line{width:60px;height:2px;background:var(--gold);margin:20px 0}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:0 48px 40px}
.stat{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px 24px;backdrop-filter:blur(12px);transition:.4s;cursor:default;position:relative;overflow:hidden;
}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
.stat:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.3)}
.stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.stat-value{font-family:var(--font-display);font-size:38px;font-weight:700}
.stat-value.accent{color:var(--gold)}
.stat-sub{font-size:12px;color:var(--text2);margin-top:4px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 48px 60px}
.panel{
  background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);
  padding:28px;backdrop-filter:blur(12px);transition:.4s;position:relative;overflow:hidden;
}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent)}
.panel:hover{border-color:var(--border2)}
.panel.full{grid-column:1/-1}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.panel-head h3{font-family:var(--font-display);font-size:16px;font-weight:600}
.panel-badge{font-size:10px;font-weight:600;padding:5px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.8px}
.badge-gold{background:var(--gold-light);color:var(--gold)}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-rose{background:var(--rose-light);color:var(--rose)}
.panel-body{height:350px}
.panel.full .panel-body{height:420px}

.footer{text-align:center;padding:32px;color:var(--text3);font-size:11px;border-top:1px solid var(--border);letter-spacing:.5px}

@media(max-width:1200px){.stats{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.hero{padding:40px 24px}.hero h1{font-size:36px}}
</style>
</head>
<body>
<div class="bg-glow"></div>
<canvas id="globe-canvas"></canvas>

<div class="app">
<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">🚗</div>
    <div class="nav-title">UsedCar<span>Insight</span></div>
  </div>
  <div class="nav-links">
    <a href="/" class="active">仪表盘</a>
    <a href="/predict">价格预测</a>
  </div>
</nav>

<div class="hero">
  <h1>二手车市场<br><em>价格洞察</em></h1>
  <div class="hero-line"></div>
  <p class="hero-sub">基于全国 <span style="color:var(--gold);font-weight:600">17,570</span> 条真实交易数据的智能分析平台</p>
</div>

<div class="stats" id="statsRow"></div>

<div class="grid">
  <div class="panel">
    <div class="panel-head"><h3>价格分布</h3><span class="panel-badge badge-gold">Distribution</span></div>
    <div class="panel-body" id="c1"></div>
  </div>
  <div class="panel">
    <div class="panel-head"><h3>品牌均价对比</h3><span class="panel-badge badge-blue">Top 20</span></div>
    <div class="panel-body" id="c2"></div>
  </div>
  <div class="panel">
    <div class="panel-head"><h3>年份价格趋势</h3><span class="panel-badge badge-green">Trend</span></div>
    <div class="panel-body" id="c3"></div>
  </div>
  <div class="panel">
    <div class="panel-head"><h3>城市均价排名</h3><span class="panel-badge badge-rose">Cities</span></div>
    <div class="panel-body" id="c4"></div>
  </div>
  <div class="panel full">
    <div class="panel-head"><h3>里程折旧曲线</h3><span class="panel-badge badge-gold">Depreciation</span></div>
    <div class="panel-body" id="c5"></div>
  </div>
</div>

<footer class="footer">UsedCarInsight · Data from guazi.com · For Educational Purposes · 2026</footer>
</div>

<!-- Three.js Globe -->
<script>
(function(){
  const canvas=document.getElementById('globe-canvas');
  const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100);
  camera.position.set(0,1.2,8);
  const geo=new THREE.SphereGeometry(2.4,64,48);
  const globe=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0x1a2540,transparent:true,opacity:.35,wireframe:true}));
  scene.add(globe);
  const globe2=new THREE.Mesh(new THREE.SphereGeometry(2.38,64,48),new THREE.MeshBasicMaterial({color:0x0f1a30,transparent:true,opacity:.5}));
  scene.add(globe2);
  const pg=new THREE.BufferGeometry();const c=600;const p=new Float32Array(c*3);
  for(let i=0;i<c;i++){const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1),r=2.5+Math.random()*1.2;p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=r*Math.cos(ph)}
  pg.setAttribute('position',new THREE.BufferAttribute(p,3));
  const pts=new THREE.Points(pg,new THREE.PointsMaterial({color:0xd4a853,size:.025,transparent:true,opacity:.7,blending:THREE.AdditiveBlending}));
  scene.add(pts);
  const ring=new THREE.Mesh(new THREE.TorusGeometry(2.7,.015,16,100),new THREE.MeshBasicMaterial({color:0xd4a853,transparent:true,opacity:.4}));
  ring.rotation.x=Math.PI/3;scene.add(ring);
  const ring2=new THREE.Mesh(new THREE.TorusGeometry(2.9,.01,16,80),new THREE.MeshBasicMaterial({color:0x4d90fe,transparent:true,opacity:.25}));
  ring2.rotation.x=-Math.PI/4;ring2.rotation.y=Math.PI/6;scene.add(ring2);
  function animate(){requestAnimationFrame(animate);const t=Date.now()*.0002;globe.rotation.y+=.0015;globe2.rotation.y+=.0015;pts.rotation.y+=.0008;pts.rotation.x=Math.sin(t)*.1;ring.rotation.z+=.0006;ring2.rotation.z-=.0004;ring2.rotation.x+=.0003;renderer.render(scene,camera)}
  animate();
  window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight)});
})();
</script>

<script>
const Th={text:'#8894a8',gold:'#d4a853',blue:'#4d90fe',green:'#34c759',rose:'#e06090',border:'rgba(255,255,255,0.06)'};
async function get(u){const r=await fetch(u);return r.json()}

// Init all charts
function initCharts(){
  // Helper: bar with gradient
  function barGrad(color,c2){
    return new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color},{offset:1,color:c2}])
  }
  function horiGrad(color,c2){
    return new echarts.graphic.LinearGradient(1,0,0,0,[{offset:0,color},{offset:1,color:c2}])
  }
  function areaGrad(color){
    return new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:color+'26'},{offset:1,color:color+'00'}])
  }
  const baseOpt = {
    textStyle:{color:Th.text},
    grid:{top:10,right:24,bottom:30,left:56},
  };
  const baseTooltip = {
    trigger:'axis',
    backgroundColor:'#0f1520',
    borderColor:'rgba(255,255,255,0.1)',
    textStyle:{color:Th.text,fontSize:12},
    axisPointer:{lineStyle:{color:Th.border}}
  };

  // c1: Price Distribution
  get('/api/price_distribution').then(data=>{
    if(!data.length) return;
    const c=echarts.init(document.getElementById('c1'));
    c.setOption({...baseOpt,
      tooltip:baseTooltip,
      xAxis:{type:'category',data:data.map(d=>d.range),axisLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
      yAxis:{type:'value',splitLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
      series:[{data:data.map(d=>d.count),type:'bar',itemStyle:{color:barGrad(Th.gold,'rgba(212,168,83,0.2)'),borderRadius:[6,6,0,0]},barMaxWidth:40}]
    });
  });

  // c2: Brand avg price
  get('/api/price_by_brand').then(data=>{
    if(!data.length) return;
    const d=data.slice(-20);
    const c=echarts.init(document.getElementById('c2'));
    c.setOption({...baseOpt,
      grid:{top:10,right:20,bottom:20,left:80},
      tooltip:{...baseTooltip,formatter:p=>p[0].name+'<br/>均价: ¥'+p[0].value+'万'},
      xAxis:{type:'value',splitLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
      yAxis:{type:'category',data:d.map(x=>x.brand),inverse:true,axisLabel:{color:Th.text,fontSize:11,fontWeight:500}},
      series:[{data:d.map(x=>+x.mean.toFixed(2)),type:'bar',itemStyle:{color:horiGrad(Th.blue,'rgba(77,144,254,0.2)'),borderRadius:[0,4,4,0]},barMaxWidth:16}]
    });
  });

  // c3: Year trend
  get('/api/price_by_year').then(data=>{
    if(!data.length) return;
    const c=echarts.init(document.getElementById('c3'));
    c.setOption({...baseOpt,
      tooltip:baseTooltip,
      xAxis:{type:'category',data:data.map(d=>d.year),axisLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
      yAxis:{type:'value',splitLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10},min:v=>Math.floor(v-1)},
      series:[{data:data.map(d=>+d.mean.toFixed(2)),type:'line',smooth:true,lineStyle:{color:Th.green,width:2.5},itemStyle:{color:Th.green},symbol:'circle',symbolSize:6,areaStyle:{color:areaGrad(Th.green)}}]
    });
  });

  // c4: City
  get('/api/price_by_city').then(data=>{
    if(!data.length) return;
    const d=data.slice(-20);
    const c=echarts.init(document.getElementById('c4'));
    c.setOption({...baseOpt,
      grid:{top:10,right:20,bottom:20,left:70},
      tooltip:{...baseTooltip,formatter:p=>p[0].name+'<br/>均价: ¥'+p[0].value+'万'},
      xAxis:{type:'value',splitLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
      yAxis:{type:'category',data:d.map(x=>x.city),inverse:true,axisLabel:{color:Th.text,fontSize:11,fontWeight:500}},
      series:[{data:d.map(x=>+x.mean.toFixed(2)),type:'bar',itemStyle:{color:horiGrad(Th.rose,'rgba(224,96,144,0.2)'),borderRadius:[0,4,4,0]},barMaxWidth:14}]
    });
  });

  // c5: Mileage depreciation
  get('/api/price_by_mileage').then(data=>{
    if(!data.length) return;
    const c=echarts.init(document.getElementById('c5'));
    c.setOption({...baseOpt,
      grid:{top:10,right:24,bottom:30,left:56},
      tooltip:baseTooltip,
      xAxis:{type:'category',data:data.map(d=>d.mileage_bucket+'万km'),axisLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10}},
      yAxis:{type:'value',splitLine:{lineStyle:{color:Th.border}},axisLabel:{color:Th.text,fontSize:10},name:'万元',nameTextStyle:{color:Th.text}},
      series:[{data:data.map(d=>+d.mean?.toFixed(2)),type:'bar',itemStyle:{color:barGrad(Th.gold,'rgba(212,168,83,0.1)'),borderRadius:[6,6,0,0]},barMaxWidth:32}]
    });
  });
}

// Stats
async function loadStats(){
  const s=await get('/api/stats');
  document.getElementById('statsRow').innerHTML=[
    {l:'总车源',v:s.total_cars?.toLocaleString(),sub:'辆覆盖全国'},
    {l:'市场均价',v:'¥'+s.avg_price+'万',sub:'全国平均价',accent:true},
    {l:'覆盖城市',v:s.cities,sub:'个城市'},
    {l:'数据年份',v:s.avg_year,sub:'年平均'},
  ].map(d=>`<div class="stat"><div class="stat-label">${d.l}</div><div class="stat-value${d.accent?' accent':''}">${d.v}</div><div class="stat-sub">${d.sub}</div></div>`).join('');
}

// Run everything
window.addEventListener('DOMContentLoaded',()=>{
  Promise.all([loadStats()]).then(()=>{
    initCharts();
    // GSAP entrance after data loaded
    gsap.from('.hero h1',{y:30,opacity:0,duration:.8,ease:'power3.out'});
    gsap.from('.hero-sub',{y:20,opacity:0,duration:.6,delay:.1});
    gsap.from('.hero-line',{scaleX:0,duration:.8,delay:.2,transformOrigin:'left'});
    gsap.from('.stat',{y:40,opacity:0,duration:.7,stagger:.12,delay:.3,ease:'power3.out'});
    gsap.from('.panel',{y:50,opacity:0,duration:.8,stagger:.1,delay:.6,ease:'power3.out'});
  });
});

window.addEventListener('resize',()=>{
  ['c1','c2','c3','c4','c5'].forEach(id=>{
    const d=document.getElementById(id);if(d){const i=echarts.getInstanceByDom(d);if(i)i.resize()}
  });
});
</script>
</body>
</html>
